name: Rocland API CI/CD Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 1. Descargar el código más reciente
        uses: actions/checkout@v4

      - name: 2. Compilar nueva imagen (Sin apagar el sistema)
        run: docker-compose build

      - name: 3. Desplegar (Recrea el contenedor sin apenas downtime)
        run: docker-compose up -d

      - name: 4. Limpiar imágenes viejas
        run: docker image prune -f