services:
  rocland-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rocland-api
    ports:
      - "5000:8080"
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - C:\RoclandConfig:C:\external_secrets:ro
    entrypoint: 
      - cmd
      - /c
      - xcopy C:\external_secrets\* C:\app\Modules /s /y /i && dotnet Rocland.Api.dll